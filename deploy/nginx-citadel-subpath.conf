# CITADEL を既存ドメインのサブパスで公開する場合の設定（Nginx）
#
# これは「新しい server {} を作る」のではなく、既に動いている
# example.com の server {} ブロックの中に、以下の location を追加するものです。
#
#   公開URL : https://example.com/httpsdocs/citadel/
#   Nodeアプリ: 127.0.0.1:3000 で常駐（PM2）
#
# ※ location の prefix（/httpsdocs/citadel/）は、実際に公開したいURLのパスに合わせてください。
#    クライアント側(index.html)はURLからパスを自動判別するので、ここを変えるだけで追従します。

location /httpsdocs/citadel/ {
    # 末尾の "/" が重要：プレフィックスを取り除いて Node 側へ "/..." として渡す
    proxy_pass http://127.0.0.1:3000/;

    proxy_http_version 1.1;

    # WebSocket(Socket.IO) のアップグレードを通すために必須
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 長時間のWebSocket接続が切れないように
    proxy_read_timeout 86400;
}

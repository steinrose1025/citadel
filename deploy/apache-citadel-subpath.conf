# CITADEL を既存ドメインのサブパスで公開する場合の設定（Apache）
#
# example.com の HTTPS用 <VirtualHost *:443> ブロックの中へ、以下を追記します。
# （既存の /vote/ プロキシと同じ並びに足すイメージ）
#
#   公開URL : https://example.com/citadel/
#             ※ DocumentRoot が httpsdocs のため、URLに "httpsdocs" は付きません。
#   ファイル: /var/www/vhosts/example.com/httpsdocs/citadel/
#   Nodeアプリ: 127.0.0.1:3000 で常駐（PM2）
#
# 事前に必要なモジュール（一度だけ）:
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite
#   sudo systemctl reload apache2
#
# ※ ProxyPreserveHost On は既存vhostで設定済みのため、重複指定は不要です。
# ※ パスの prefix（/citadel/）を変える場合、クライアント(index.html)はURLから
#    自動判別するため、ここを変えるだけで追従します。

    # === CITADEL ネット対戦 (Node 127.0.0.1:3000) へのプロキシ ===
    RewriteEngine On
    # Socket.IO の WebSocket アップグレードを中継（プレフィックス /citadel を除去して /socket.io/ へ）
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/citadel/socket\.io/(.*)$ ws://127.0.0.1:3000/socket.io/$1 [P,L]

    # それ以外（HTTPポーリング・静的・ページ本体）。末尾 "/" 同士でプレフィックスを除去
    ProxyPass        /citadel/ http://127.0.0.1:3000/
    ProxyPassReverse /citadel/ http://127.0.0.1:3000/
    <Location /citadel/>
        RequestHeader set X-Forwarded-Proto "https"
    </Location>
    RedirectMatch ^/citadel$ /citadel/
    # === CITADEL ここまで ===

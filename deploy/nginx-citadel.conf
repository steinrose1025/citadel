# CITADEL リバースプロキシ設定（Nginx）
# 置き場所: /etc/nginx/sites-available/citadel
# 反映:     sudo ln -s /etc/nginx/sites-available/citadel /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
#
# ※ example.com は自分のドメインに置き換えてください。
# ※ HTTPS化(Certbot)を行うと、この80番ブロックはCertbotが自動で443へ書き換えます。

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket(Socket.IO) のアップグレードを通すために必須
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 長時間のWebSocket接続が切れないように
        proxy_read_timeout 86400;
    }
}
